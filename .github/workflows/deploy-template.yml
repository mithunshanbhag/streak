name: streak-deploy-template

on:
  workflow_call:
    inputs:
      environmentName:
        required: true
        type: string
      runProvisioning:
        required: true
        type: boolean

env:
  ANDROID_RUNTIME_IDENTIFIER: "android-arm64"
  ANDROID_TARGET_FRAMEWORK: "net10.0-android"
  DOTNET_VERSION_10: "10.0.x"
  RESOURCE_GROUP_NAME: streak-rg
  RESOURCE_LOCK_NAME: streak-rg-delete-lock
  # metadata will be stored, and not where the resource groups will be deployed.
  # You can specify any location for `SUB_DEPLOYMENT_REGION`. It's the region where 
  # the deployment metadata will be stored, and not where the resource groups will be deployed.
  SUB_DEPLOYMENT_REGION: centralindia
  WINDOWS_TARGET_FRAMEWORK: "net10.0-windows10.0.19041.0"

jobs:
  provision:
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environmentName }}
    timeout-minutes: 30
    steps:
      - name: checkout code
        uses: actions/checkout@v4.1.1
      - name: azure login
        uses: azure/login@v2.2.0
        with:
          creds: ${{ secrets.SERVICEPRINCIPAL }}
      # temporarily use az cli to upgrade bicep
      # Context: https://github.com/Azure/bicep/issues/16681#issuecomment-2747568200
      - name: upgrade bicep
        uses: azure/CLI@v2.2.0
        with:
          inlineScript: az bicep upgrade
      #
      # section #1: provisioning the resources on Azure using bicep templates
      #
      # The first step is to create the resource group: `streak-rg`.
      # The below step can also be manually executed as follows:
      # az deployment sub create --location {LOCATION} --template-file .\createResourceGroup.bicep
      # Note: You can specify any location for `{LOCATION}`. It's the region where the deployment metadata will be stored, and not
      # where the resource groups will be deployed.
      # @TODO: The 'azure/arm-deploy' action will soon be deprecated. Move to the 'azure/bicep-deploy' github action.
      - name: create resource group
        uses: Azure/arm-deploy@v2
        if: ${{ inputs.runProvisioning == true }}
        with:
          scope: subscription
          region: ${{ env.SUB_DEPLOYMENT_REGION }}
          deploymentName: deployment-run${{ github.run_number }}-attempt${{ github.run_attempt }}
          template: ./infra/createResourceGroup.bicep
          parameters: rgName=${{ env.RESOURCE_GROUP_NAME }} envName=${{ inputs.environmentName }} githubCommitSha=${{ github.sha }} githubWorkflowRunId=${{ github.run_id }} githubRef=${{ github.ref }}
      # Delete resource lock if it exists on the resource group
      - name: delete any existing resource lock
        uses: azure/CLI@v2.2.0
        if: ${{ inputs.runProvisioning == true }}
        with:
          inlineScript: |
            az lock delete --name ${{ env.RESOURCE_LOCK_NAME }} --resource-group ${{ env.RESOURCE_GROUP_NAME }} || echo "No existing lock to delete"
      # Next step is to deploy the Azure resources to the resource group `streak-rg` created above. The deployed resources
      # include storage accounts, function apps, app services cosmos db, and service bus etc.
      # The below step can also be manually executed as follows:
      # az deployment group create -g streak-rg --template-file .\createResources.bicep --parameters .\createResources.parameters.json
      # Note: The `createResources.parameters.json` file contains the parameters for the deployment; specifically the environment name.
      # You can modify the parameters to customize the deployment.
      # Note: The bicep template outputs are not shown in the logs. You can extract the outputs as shown here:
      # https://github.com/Azure/arm-deploy#another-example-on-how-to-use-this-action-to-get-the-output-of-arm-template
      # @TODO: The 'azure/arm-deploy' action will soon be deprecated. Move to the 'azure/bicep-deploy' github action.
      - name: create resources
        uses: Azure/arm-deploy@v2
        if: ${{ inputs.runProvisioning == true }}
        with:
          scope: resourcegroup
          region: ${{ env.SUB_DEPLOYMENT_REGION }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          deploymentMode: Complete
          deploymentName: deployment-run${{ github.run_number }}-attempt${{ github.run_attempt }}
          template: ./infra/createResources.bicep
          parameters: envName=${{ inputs.environmentName }} githubCommitSha=${{ github.sha }} githubWorkflowRunId=${{ github.run_id }} githubRef=${{ github.ref }}
      # Add resource lock
      - name: add resource lock
        uses: azure/CLI@v2.2.0
        if: ${{ inputs.runProvisioning == true }}
        with:
          inlineScript: az lock create --name ${{ env.RESOURCE_LOCK_NAME }} --lock-type CanNotDelete --resource-group ${{ env.RESOURCE_GROUP_NAME }}

  build-deploy-streak-ui:
    runs-on: windows-2025-vs2026
    environment: ${{ inputs.environmentName }}
    timeout-minutes: 20
    needs: provision
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
      - name: setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION_10 }}
      - name: dotnet restore
        run: dotnet restore ./Streak.slnx --nologo
      - name: run unit tests (ui)
        run: dotnet test ./tests/Streak.Ui.UnitTests/Streak.Ui.UnitTests.csproj --no-restore --logger trx --results-directory ./tests/Streak.Ui.UnitTests/TestResults-${{ github.run_id }}-${{ github.run_attempt }}
      - name: publish unit test results (ui)
        uses: actions/upload-artifact@v4.3.1
        with:
          name: Streak.Ui.UnitTests
          path: ./tests/Streak.Ui.UnitTests/TestResults-${{ github.run_id }}-${{ github.run_attempt }}
      # temporarily disable windows build to ensure android build finishes quickly for testing purposes, will re-enable in future PRs
      # - name: build streak app (windows)
      #   run: dotnet publish ./src/Streak.Ui/Streak.Ui.csproj -f ${{ env.WINDOWS_TARGET_FRAMEWORK }} -c Release -o ./Publish/Streak.Ui --nologo
      - name: decode android release keystore
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\streak-release.jks",
            [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          )
      - name: build streak app (android arm64 apk)
        shell: pwsh
        run: |
          dotnet publish ./src/Streak.Ui/Streak.Ui.csproj `
            -f ${{ env.ANDROID_TARGET_FRAMEWORK }} `
            -c Release `
            -r ${{ env.ANDROID_RUNTIME_IDENTIFIER }} `
            -p:AndroidPackageFormat=apk `
            -p:ApplicationVersion=${{ github.run_number }} `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$env:RUNNER_TEMP\streak-release.jks" `
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
            -o ./Publish/Streak.Ui.Android `
            --nologo
      - name: delete decoded keystore
        shell: pwsh
        run: Remove-Item -Path "$env:RUNNER_TEMP\streak-release.jks" -Force
      - name: collect streak app artifact (android apk)
        shell: pwsh
        run: |
          $searchPaths = @(
            "./Publish/Streak.Ui.Android",
            "./src/Streak.Ui/bin/Release/${{ env.ANDROID_TARGET_FRAMEWORK }}/publish",
            "./src/Streak.Ui/bin/Release/${{ env.ANDROID_TARGET_FRAMEWORK }}"
          )

          $apk = $null
          foreach ($path in $searchPaths) {
            if (-not (Test-Path $path)) {
              continue
            }

            $apk = Get-ChildItem -Path $path -Filter "*-Signed.apk" -File -Recurse | Select-Object -First 1
            if ($apk) {
              break
            }
          }

          if (-not $apk) {
            throw "No signed APK was generated."
          }

          New-Item -ItemType Directory -Path ./Publish/Streak.Ui.Android.Apk -Force | Out-Null
          Copy-Item -Path $apk.FullName -Destination ./Publish/Streak.Ui.Android.Apk/
      - name: publish streak app artifact (android apk)
        uses: actions/upload-artifact@v4.3.1
        with:
          name: Streak.Ui.Android.apk
          path: ./Publish/Streak.Ui.Android.Apk/*.apk
          if-no-files-found: error
