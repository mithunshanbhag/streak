name: streak-deploy-template

on:
  workflow_call:

env:
  DOTNET_VERSION_10: "10.0.x"
  ANDROID_TARGET_FRAMEWORK: "net10.0-android"
  ANDROID_RUNTIME_IDENTIFIER: "android-arm64"
  WINDOWS_TARGET_FRAMEWORK: "net10.0-windows10.0.19041.0"

jobs:
  build-deploy-streak-ui:
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
      - name: setup dotnet
        uses: actions/setup-dotnet@v4.0.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION_10 }}
      - name: dotnet restore
        run: dotnet restore
      - name: run unit tests (core)
        run: dotnet test ./tests/Streak.Core.UnitTests/Streak.Core.UnitTests.csproj --logger trx --results-directory ./tests/Streak.Core.UnitTests/TestResults-${{ github.run_id }}-${{ github.run_attempt }}
      - name: publish unit test results (core)
        uses: actions/upload-artifact@v4.3.1
        with:
          name: Streak.Core.UnitTests
          path: ./tests/Streak.Core.UnitTests/TestResults-${{ github.run_id }}-${{ github.run_attempt }}
      - name: build streak app (windows)
        run: dotnet publish ./src/Streak.Ui/Streak.Ui.csproj -f ${{ env.WINDOWS_TARGET_FRAMEWORK }} -c Release -o ./Publish/Streak.Ui --nologo
      - name: decode android release keystore
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\streak-release.jks",
            [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          )
      - name: build streak app (android arm64 apk)
        shell: pwsh
        run: |
          dotnet publish ./src/Streak.Ui/Streak.Ui.csproj `
            -f ${{ env.ANDROID_TARGET_FRAMEWORK }} `
            -c Release `
            -r ${{ env.ANDROID_RUNTIME_IDENTIFIER }} `
            -p:AndroidPackageFormat=apk `
            -p:ApplicationVersion=${{ github.run_number }} `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$env:RUNNER_TEMP\streak-release.jks" `
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" `
            -o ./Publish/Streak.Ui.Android `
            --nologo
      - name: collect streak app artifact (android apk)
        shell: pwsh
        run: |
          $searchPaths = @(
            "./Publish/Streak.Ui.Android",
            "./src/Streak.Ui/bin/Release/${{ env.ANDROID_TARGET_FRAMEWORK }}/publish",
            "./src/Streak.Ui/bin/Release/${{ env.ANDROID_TARGET_FRAMEWORK }}"
          )

          $apk = $null
          foreach ($path in $searchPaths) {
            if (-not (Test-Path $path)) {
              continue
            }

            $apk = Get-ChildItem -Path $path -Filter "*-Signed.apk" -File -Recurse | Select-Object -First 1
            if ($apk) {
              break
            }
          }

          if (-not $apk) {
            throw "No signed APK was generated."
          }

          New-Item -ItemType Directory -Path ./Publish/Streak.Ui.Android.Apk -Force | Out-Null
          Copy-Item -Path $apk.FullName -Destination ./Publish/Streak.Ui.Android.Apk/
      - name: publish streak app artifact (android apk)
        uses: actions/upload-artifact@v4.3.1
        with:
          name: Streak.Ui.Android.apk
          path: ./Publish/Streak.Ui.Android.Apk/*.apk
          if-no-files-found: error
