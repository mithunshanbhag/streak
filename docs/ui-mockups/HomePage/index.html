<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=393, initial-scale=1.0">
    <title>Streak – Home Page Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== Phone Frame ===== -->
<div class="phone-frame">

    <!-- App Bar -->
    <header class="app-bar">
        <span class="app-bar__logo" title="Let your habits compound">Streak</span>
        <div class="app-bar__actions">
            <button class="app-bar__btn" aria-label="Add habit" title="Manage Habits">
                <span class="material-icons">add</span>
            </button>
            <button class="app-bar__btn" aria-label="Settings" title="Settings">
                <span class="material-icons">settings</span>
            </button>
            <a class="app-bar__btn" href="https://github.com/mithunshanbhag/streak" target="_blank" rel="noopener noreferrer" aria-label="GitHub" title="GitHub">
                <!-- GitHub Invertocat SVG icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            </a>
        </div>
    </header>

    <!-- ===== Habit Cards (populated state) ===== -->
    <main class="content" id="content-populated">

        <!-- Meditate – DONE, streak 12 (fire) -->
        <div class="habit-card habit-card--done" data-done="true">
            <span class="habit-card__emoji">🧘</span>
            <span class="habit-card__name">Meditate</span>
            <span class="habit-card__streak habit-card__streak--fire" title="View trends">🔥 12</span>
            <button class="habit-card__toggle habit-card__toggle--done" aria-label="Toggle checkin">
                <span class="material-icons">check_circle</span>
            </button>
        </div>

        <!-- Read – NOT DONE, streak 3 (cool) -->
        <div class="habit-card" data-done="false">
            <span class="habit-card__emoji">📖</span>
            <span class="habit-card__name">Read</span>
            <span class="habit-card__streak habit-card__streak--cool" title="View trends">😎 3</span>
            <button class="habit-card__toggle habit-card__toggle--not-done" aria-label="Toggle checkin">
                <span class="material-icons">radio_button_unchecked</span>
            </button>
        </div>

        <!-- Exercise – NOT DONE, streak 0 (broken) -->
        <div class="habit-card" data-done="false">
            <span class="habit-card__emoji">💪</span>
            <span class="habit-card__name">Exercise</span>
            <span class="habit-card__streak habit-card__streak--zero" title="View trends">0</span>
            <button class="habit-card__toggle habit-card__toggle--not-done" aria-label="Toggle checkin">
                <span class="material-icons">radio_button_unchecked</span>
            </button>
        </div>

        <!-- Run – DONE, streak 5 (cool) -->
        <div class="habit-card habit-card--done" data-done="true">
            <span class="habit-card__emoji">🏃</span>
            <span class="habit-card__name">Run</span>
            <span class="habit-card__streak habit-card__streak--cool" title="View trends">😎 5</span>
            <button class="habit-card__toggle habit-card__toggle--done" aria-label="Toggle checkin">
                <span class="material-icons">check_circle</span>
            </button>
        </div>

    </main>

    <!-- ===== Empty State (hidden by default; toggle via JS or uncomment to preview) ===== -->
    <!--
    <main class="content" id="content-empty">
        <div class="empty-state">
            <div class="empty-state__emoji">🌱</div>
            <p class="empty-state__text">No habits yet. Tap <strong>+</strong> to add your first one!</p>
            <button class="empty-state__btn">
                <span class="material-icons">add</span>
                Add Habit
            </button>
        </div>
    </main>
    -->

</div><!-- /phone-frame -->

<script>
    // Toggle checkin state on click
    document.querySelectorAll('.habit-card__toggle').forEach(function (btn) {
        btn.addEventListener('click', function () {
            var card = btn.closest('.habit-card');
            var icon = btn.querySelector('.material-icons');
            var isDone = card.getAttribute('data-done') === 'true';

            if (isDone) {
                // Switch to NOT DONE
                card.setAttribute('data-done', 'false');
                card.classList.remove('habit-card--done');
                btn.classList.remove('habit-card__toggle--done');
                btn.classList.add('habit-card__toggle--not-done');
                icon.textContent = 'radio_button_unchecked';
            } else {
                // Switch to DONE
                card.setAttribute('data-done', 'true');
                card.classList.add('habit-card--done');
                btn.classList.remove('habit-card__toggle--not-done');
                btn.classList.add('habit-card__toggle--done');
                icon.textContent = 'check_circle';
            }
        });
    });
</script>

</body>
</html>
