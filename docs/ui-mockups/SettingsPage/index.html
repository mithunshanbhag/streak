<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streak – Settings Page (Mockup)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="phone-frame">
    <!-- ===== App Bar ===== -->
    <header class="app-bar">
      <div class="app-bar-left">
        <button class="icon-btn" title="Back to Home">
          <span class="material-icons">arrow_back</span>
        </button>
        <span class="app-bar-title">Settings</span>
      </div>
      <div class="app-bar-right">
        <button class="icon-btn" title="Manage Habits">
          <span class="material-icons">add</span>
        </button>
        <button class="icon-btn" title="Settings">
          <span class="material-icons">settings</span>
        </button>
        <button class="icon-btn" title="GitHub Repository">
          <!-- GitHub Octicon SVG -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303
              3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
              0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61
              C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729
              1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809
              1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93
              0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176
              0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399
              3-.405 1.02.006 2.04.138 3 .405 2.28-1.552
              3.285-1.23 3.285-1.23.645 1.653.24 2.873.12
              3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805
              5.625-5.475 5.92.42.36.81 1.096.81
              2.22 0 1.606-.015 2.896-.015 3.286 0
              .315.21.69.825.57C20.565 22.092 24 17.592
              24 12.297c0-6.627-5.373-12-12-12" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== Page Content ===== -->
    <main class="page-content">
      <div class="settings-card">
        <h2 class="section-header">Daily Reminder</h2>

        <!-- Toggle Row -->
        <div class="setting-row">
          <span class="setting-label">Enable reminders</span>
          <label class="toggle-switch">
            <input type="checkbox" id="reminderToggle" checked />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>

        <!-- Time Picker Row -->
        <div class="time-picker-row" id="timePickerRow">
          <div class="setting-row">
            <span class="setting-label">Reminder time</span>
            <div class="time-display" id="timeDisplay">
              <input type="time" class="time-input-native" id="timeInput" value="21:00" />
              <span class="material-icons">schedule</span>
              <span class="time-text" id="timeText">9:00 PM</span>
            </div>
          </div>
        </div>
      </div>

      <p class="helper-text">
        You'll be reminded only if there are habits you haven't checked in yet.
      </p>
    </main>
  </div>

  <script>
    const toggle = document.getElementById('reminderToggle');
    const timePickerRow = document.getElementById('timePickerRow');
    const timeInput = document.getElementById('timeInput');
    const timeText = document.getElementById('timeText');

    // Toggle: show/hide time picker row
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        timePickerRow.classList.remove('hidden');
      } else {
        timePickerRow.classList.add('hidden');
      }
    });

    // Format 24h value to 12h AM/PM display
    function formatTime(value) {
      const [hourStr, minStr] = value.split(':');
      let hour = parseInt(hourStr, 10);
      const min = minStr;
      const ampm = hour >= 12 ? 'PM' : 'AM';
      if (hour === 0) hour = 12;
      else if (hour > 12) hour -= 12;
      return hour + ':' + min + ' ' + ampm;
    }

    // Update display when time input changes
    timeInput.addEventListener('change', () => {
      timeText.textContent = formatTime(timeInput.value);
    });
  </script>

</body>
</html>
