<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streak – Settings Page (Mockup)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone-frame">
    <header class="app-bar">
      <div class="app-bar-left">
        <a class="icon-btn" href="../HabitsPage/index.html" title="Back to Habits">
          <span class="material-icons">arrow_back</span>
        </a>
        <span class="app-bar-title">Settings</span>
      </div>
      <div class="app-bar-right">
        <a class="icon-btn" href="../CreateHabitPage/index.html" title="Create Habit">
          <span class="material-icons">add</span>
        </a>
      </div>
    </header>

    <main class="page-content">
      <section class="page-context">
        <p class="page-context__description">Reminder settings only.</p>
      </section>

      <div class="settings-card">
        <div class="section-header-row">
          <div>
            <h2 class="section-header">Daily Reminder</h2>
            <p class="section-description">Only shows when a habit is still pending.</p>
          </div>
          <span class="section-chip">9:00 PM</span>
        </div>

        <div class="setting-row">
          <span class="setting-label">Enable reminders</span>
          <label class="toggle-switch">
            <input type="checkbox" id="reminderToggle" checked>
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>

        <div class="time-picker-row" id="timePickerRow">
          <div class="setting-row">
            <span class="setting-label">Reminder time</span>
            <div class="time-display" id="timeDisplay">
              <input type="time" class="time-input-native" id="timeInput" value="21:00">
              <span class="material-icons">schedule</span>
              <span class="time-text" id="timeText">9:00 PM</span>
            </div>
          </div>
        </div>
      </div>

      <p class="helper-text">Habits are managed from the Habits page.</p>
    </main>
  </div>

  <script>
    const toggle = document.getElementById('reminderToggle');
    const timePickerRow = document.getElementById('timePickerRow');
    const timeInput = document.getElementById('timeInput');
    const timeText = document.getElementById('timeText');

    toggle.addEventListener('change', () => {
      timePickerRow.classList.toggle('hidden', !toggle.checked);
    });

    function formatTime(value) {
      const [hourStr, minStr] = value.split(':');
      let hour = parseInt(hourStr, 10);
      const ampm = hour >= 12 ? 'PM' : 'AM';
      if (hour === 0) hour = 12;
      else if (hour > 12) hour -= 12;
      return hour + ':' + minStr + ' ' + ampm;
    }

    timeInput.addEventListener('change', () => {
      timeText.textContent = formatTime(timeInput.value);
    });
  </script>
</body>
</html>
