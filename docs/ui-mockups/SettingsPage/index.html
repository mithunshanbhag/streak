<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streak – Settings Page (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="phone-frame">
    <header class="app-bar">
        <div class="app-bar-left">
            <a class="icon-btn" href="../Homepage/index.html" title="Back to Homepage">
                <span class="material-icons">arrow_back</span>
            </a>
            <span class="app-bar-title">Settings</span>
        </div>
    </header>

    <main class="page-content">
        <section class="settings-card">
            <div class="section-header-row">
                <div>
                    <p class="section-eyebrow">Data</p>
                    <div class="subsection-title-row">
                        <h1 class="section-header">Backup</h1>
                        <button
                            class="hint-icon-btn hint-icon-btn--info"
                            type="button"
                            aria-label="Backup save location info"
                            data-tooltip="Android saves to 'Downloads' folder. Windows lets you choose where to save.">
                            <span class="material-icons">info</span>
                        </button>
                    </div>
                    <p class="section-description">Download, share, or restore your local data.</p>
                </div>
            </div>

            <div class="data-action-group" aria-label="Database actions">
                <button class="data-action-icon-btn" type="button" aria-label="Download DB" data-tooltip="Download DB">
                    <span class="material-icons">download</span>
                </button>
                <button class="data-action-icon-btn" type="button" aria-label="Share DB" data-tooltip="Share DB">
                    <span class="material-icons">ios_share</span>
                </button>
                <button class="data-action-icon-btn" type="button" aria-label="Upload DB" data-tooltip="Upload DB">
                    <span class="material-icons">upload</span>
                </button>
            </div>

            <div class="warning-note" role="note" aria-label="Restore warning">
                <span class="material-icons">warning</span>
                <p>Upload DB replaces all existing data. This cannot be undone.</p>
            </div>
        </section>
    </main>
</div>
</body>
</html>
