<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=393, initial-scale=1.0">
    <title>Streak – Create Habit Page Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone-frame">
    <header class="app-bar">
        <div class="app-bar__left">
            <a class="app-bar__btn" href="../HabitsPage/index.html" aria-label="Back" title="Back to Habits">
                <span class="material-icons">arrow_back</span>
            </a>
            <span class="app-bar__title">Create Habit</span>
        </div>
        <div class="app-bar__actions">
            <a class="app-bar__btn" href="../SettingsPage/index.html" aria-label="Settings" title="Settings">
                <span class="material-icons">settings</span>
            </a>
        </div>
    </header>

    <main class="content">
        <section class="page-context">
            <p class="page-context__description">Add a habit. It will appear alphabetically on Habits.</p>
        </section>

        <section class="page-card">
            <h2 class="section-title">Habit details</h2>
            <p class="section-text">Use a short, unique name. Emoji is optional.</p>

            <div class="text-field">
                <input type="text" class="text-field__input" id="habitNameInput" placeholder=" " autocomplete="off">
                <label class="text-field__label" for="habitNameInput">Name</label>
            </div>
            <p class="field-help">1–30 characters, unique among your habits.</p>

            <div class="text-field text-field--small">
                <input type="text" class="text-field__input" id="habitEmojiInput" placeholder=" " autocomplete="off">
                <label class="text-field__label" for="habitEmojiInput">Emoji</label>
            </div>
            <p class="field-help">Optional. Leave blank to use the default icon.</p>

            <div class="preview-card">
                <span class="preview-card__label">Preview</span>
                <div class="preview-card__habit">
                    <span class="preview-card__emoji">✨</span>
                    <span class="preview-card__name">New habit</span>
                </div>
            </div>

            <div class="page-actions">
                <a class="btn-text" href="../HabitsPage/index.html">Cancel</a>
                <a class="btn-contained" href="../HabitsPage/index.html">Save Habit</a>
            </div>
        </section>
    </main>
</div>

</body>
</html>
