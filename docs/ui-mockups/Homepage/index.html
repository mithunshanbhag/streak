<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=393, initial-scale=1.0">
    <title>Streak – Homepage Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="phone-frame">
    <header class="app-bar">
        <span class="app-bar__logo" title="Let your habits compound">Streak</span>
        <div class="app-bar__actions">
            <a class="app-bar__btn" href="../SettingsPage/index.html" aria-label="Settings" title="Settings">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81C14.36 2.57 14.16 2.4 13.92 2.4H10.08c-.24 0-.43.17-.47.41L9.25 5.35c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94L2.86 14.52c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </a>
            <a class="app-bar__btn" href="https://github.com/mithunshanbhag/streak" aria-label="View source code on GitHub" title="View source code on GitHub" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.11.79-.25.79-.56v-2.18c-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.27-1.68-1.27-1.68-1.04-.71.08-.69.08-.69 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.68 1.25 3.33.96.1-.74.4-1.25.73-1.54-2.55-.29-5.23-1.27-5.23-5.66 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.47.11-3.07 0 0 .97-.31 3.19 1.18A11.1 11.1 0 0 1 12 6.32c.98 0 1.96.13 2.88.39 2.21-1.49 3.18-1.18 3.18-1.18.63 1.6.24 2.78.12 3.07.73.8 1.17 1.83 1.17 3.08 0 4.4-2.69 5.36-5.25 5.64.41.36.78 1.07.78 2.16v3.2c0 .31.21.68.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
                </svg>
            </a>
        </div>
    </header>

    <main class="content" id="habitList">
        <div class="date-banner" aria-label="Today's date">
            <span class="date-banner__icon" aria-hidden="true">📅</span>
            <span class="date-banner__text" id="todayDate">Friday, Mar 27</span>
        </div>

        <article class="habit-card habit-card--done" data-name="Exercise">
            <a class="habit-card__details" href="../HabitDetailsPage/index.html" title="Open Exercise details">
                <span class="habit-card__emoji">💪</span>
                <span class="habit-card__copy">
                    <span class="habit-card__name">Exercise</span>
                    <span class="habit-card__meta habit-card__meta--thumbs">👍 2 day streak</span>
                </span>
            </a>
            <button class="habit-card__toggle habit-card__toggle--done" aria-label="Toggle Exercise" aria-pressed="true">
                <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5-4.5-4.5 1.41-1.41L10 13.67l7.09-7.09 1.41 1.41L10 16.5z"/></svg>
            </button>
        </article>

        <article class="habit-card habit-card--done" data-name="Meditate">
            <a class="habit-card__details" href="../HabitDetailsPage/index.html" title="Open Meditate details">
                <span class="habit-card__emoji">🧘</span>
                <span class="habit-card__copy">
                    <span class="habit-card__name">Meditate</span>
                    <span class="habit-card__meta habit-card__meta--fire">🔥 12 day streak</span>
                </span>
            </a>
            <button class="habit-card__toggle habit-card__toggle--done" aria-label="Toggle Meditate" aria-pressed="true">
                <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5-4.5-4.5 1.41-1.41L10 13.67l7.09-7.09 1.41 1.41L10 16.5z"/></svg>
            </button>
        </article>

        <article class="habit-card" data-name="Read">
            <a class="habit-card__details" href="../HabitDetailsPage/index.html" title="Open Read details">
                <span class="habit-card__emoji">📖</span>
                <span class="habit-card__copy">
                    <span class="habit-card__name">Read</span>
                    <span class="habit-card__meta habit-card__meta--clap">👏 3 day streak</span>
                </span>
            </a>
            <button class="habit-card__toggle habit-card__toggle--not-done" aria-label="Toggle Read" aria-pressed="false">
                <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
            </button>
        </article>

        <article class="habit-card" data-name="Run">
            <a class="habit-card__details" href="../HabitDetailsPage/index.html" title="Open Run details">
                <span class="habit-card__emoji">🏃</span>
                <span class="habit-card__copy">
                    <span class="habit-card__name">Run</span>
                    <span class="habit-card__meta habit-card__meta--clap">👏 5 day streak</span>
                </span>
            </a>
            <button class="habit-card__toggle habit-card__toggle--not-done" aria-label="Toggle Run" aria-pressed="false">
                <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
            </button>
        </article>

        <section class="habit-list-footer" aria-label="Create a new habit">
            <div class="habit-list-footer__rule"></div>
            <a class="habit-list-footer__btn" href="../CreateHabitPage/index.html">
                <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor" aria-hidden="true"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span>New Habit</span>
            </a>
        </section>
    </main>
</div>

<script>
    const CHECK_PATH   = "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5-4.5-4.5 1.41-1.41L10 13.67l7.09-7.09 1.41 1.41L10 16.5z";
    const CIRCLE_PATH  = "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z";

    // Populate the date banner with the current date.
    (function () {
        const el = document.getElementById('todayDate');
        if (el) {
            const now = new Date();
            el.textContent = now.toLocaleDateString('en-US', {
                weekday: 'long',
                month: 'short',
                day: 'numeric'
            });
        }
    })();

    document.querySelectorAll('.habit-card__toggle').forEach(button => {
        button.addEventListener('click', () => {
            const card   = button.closest('.habit-card');
            const svgPath = button.querySelector('.toggle-icon path');
            const isDone = button.classList.contains('habit-card__toggle--done');

            button.classList.toggle('habit-card__toggle--done',     !isDone);
            button.classList.toggle('habit-card__toggle--not-done',  isDone);
            button.setAttribute('aria-pressed', String(!isDone));
            card.classList.toggle('habit-card--done', !isDone);
            svgPath.setAttribute('d', isDone ? CIRCLE_PATH : CHECK_PATH);
        });
    });
</script>
</body>
</html>
