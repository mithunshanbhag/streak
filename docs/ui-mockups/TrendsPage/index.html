<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Streak — Trends Page Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Phone Frame -->
  <div class="phone-frame">

    <!-- App Bar -->
    <header class="app-bar">
      <div class="app-bar-left">
        <button class="app-bar-btn" title="Back to Home">
          <span class="material-icons">arrow_back</span>
        </button>
        <span class="app-bar-title">🧘 Meditate</span>
      </div>
      <div class="app-bar-right">
        <button class="app-bar-btn" title="Create Habit">
          <span class="material-icons">add</span>
        </button>
        <button class="app-bar-btn" title="Settings">
          <span class="material-icons">settings</span>
        </button>
        <button class="app-bar-btn" title="More actions (Manage Habits, GitHub)">
          <span class="material-icons">more_vert</span>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">

      <!-- Section 1: Streak Counter -->
      <div class="card streak-counter">
        <div class="streak-number-row">
          <span class="streak-number">12</span>
          <span class="streak-fire">🔥</span>
        </div>
        <span class="streak-label">days streak</span>
      </div>

      <!-- Section 2: Calendar Heatmap -->
      <div class="card heatmap-section">
        <div class="heatmap-title">Activity — Last 90 Days</div>
        <div class="heatmap-wrapper">
          <div class="heatmap-container">
            <div class="heatmap-months" id="month-labels"></div>
            <div class="heatmap-grid">
              <div class="day-labels" id="day-labels"></div>
              <div class="weeks-container" id="weeks-container"></div>
            </div>
          </div>
        </div>
        <div class="heatmap-legend">
          <span class="legend-item">
            <span class="legend-swatch missed"></span> Missed
          </span>
          <span class="legend-item">
            <span class="legend-swatch done"></span> Done
          </span>
        </div>
      </div>

    </main>
  </div>

  <!-- Tooltip element -->
  <div class="tooltip" id="tooltip"></div>

  <script>
    (function () {
      // ===== Configuration =====
      const TOTAL_DAYS = 91; // ~13 weeks
      const STREAK_DAYS = 12;
      const RANDOM_DONE_RATE = 0.6;
      const CELL_SIZE = 14;
      const GAP = 2;

      const DAY_ABBR = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
      const MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                           'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

      // ===== Generate sample data =====
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      // Build array of { date, done } for each of the last TOTAL_DAYS days
      const days = [];
      for (let i = TOTAL_DAYS - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        let done;
        if (i < STREAK_DAYS) {
          done = true; // last 12 days are the current streak
        } else {
          // Use a seeded-ish random so the pattern looks realistic
          done = Math.random() < RANDOM_DONE_RATE;
        }
        days.push({ date: new Date(d), done: done });
      }

      // ===== Organize into weeks (columns) =====
      // Each week column has 7 rows: Mon(0)..Sun(6)
      // Find the Monday on or before the first day
      const firstDate = days[0].date;
      const firstDow = (firstDate.getDay() + 6) % 7; // 0=Mon .. 6=Sun

      // Pad with empty cells at the start of the first week
      const paddedDays = [];
      for (let i = 0; i < firstDow; i++) {
        paddedDays.push(null);
      }
      days.forEach(d => paddedDays.push(d));
      // Pad end to complete the last week
      while (paddedDays.length % 7 !== 0) {
        paddedDays.push(null);
      }

      const weeks = [];
      for (let i = 0; i < paddedDays.length; i += 7) {
        weeks.push(paddedDays.slice(i, i + 7));
      }

      // ===== Render day labels =====
      const dayLabelsEl = document.getElementById('day-labels');
      DAY_ABBR.forEach((label, i) => {
        const el = document.createElement('div');
        el.className = 'day-label';
        // Show only Mon, Wed, Fri
        el.textContent = (i % 2 === 0) ? label : '';
        dayLabelsEl.appendChild(el);
      });

      // ===== Render week columns =====
      const weeksContainer = document.getElementById('weeks-container');
      const tooltip = document.getElementById('tooltip');
      const todayStr = today.toDateString();

      weeks.forEach(week => {
        const col = document.createElement('div');
        col.className = 'week-column';

        week.forEach(day => {
          const cell = document.createElement('div');
          cell.className = 'heatmap-cell';

          if (!day) {
            cell.classList.add('empty');
          } else {
            cell.classList.add(day.done ? 'done' : 'missed');
            if (day.date.toDateString() === todayStr) {
              cell.classList.add('today');
            }

            // Tooltip data
            const monthName = MONTH_NAMES[day.date.getMonth()];
            const dayNum = day.date.getDate();
            const status = day.done ? 'Done ✅' : 'Missed';
            const label = `${monthName} ${dayNum} — ${status}`;

            cell.addEventListener('mouseenter', (e) => {
              tooltip.textContent = label;
              tooltip.classList.add('visible');
              positionTooltip(e);
            });
            cell.addEventListener('mousemove', positionTooltip);
            cell.addEventListener('mouseleave', () => {
              tooltip.classList.remove('visible');
            });
            cell.addEventListener('click', () => {
              tooltip.textContent = label;
              tooltip.classList.add('visible');
              setTimeout(() => tooltip.classList.remove('visible'), 1500);
            });
          }

          col.appendChild(cell);
        });

        weeksContainer.appendChild(col);
      });

      // ===== Render month labels =====
      const monthLabelsEl = document.getElementById('month-labels');
      // Total width for positioning
      const dayLabelWidth = 24; // day-labels width + margin
      let lastMonth = -1;

      weeks.forEach((week, weekIdx) => {
        // Find first real day in this week
        const firstReal = week.find(d => d !== null);
        if (!firstReal) return;

        const month = firstReal.date.getMonth();
        if (month !== lastMonth) {
          lastMonth = month;
          const label = document.createElement('span');
          label.className = 'month-label';
          label.textContent = MONTH_NAMES[month];
          label.style.left = (weekIdx * (CELL_SIZE + GAP)) + 'px';
          monthLabelsEl.appendChild(label);
        }
      });

      // ===== Tooltip positioning =====
      function positionTooltip(e) {
        const tt = tooltip;
        const ttRect = tt.getBoundingClientRect();
        let x = e.clientX - ttRect.width / 2;
        let y = e.clientY - ttRect.height - 14;

        // Keep tooltip within viewport
        if (x < 4) x = 4;
        if (x + ttRect.width > window.innerWidth - 4) {
          x = window.innerWidth - ttRect.width - 4;
        }
        if (y < 4) y = e.clientY + 18;

        tt.style.left = x + 'px';
        tt.style.top = y + 'px';
      }
    })();
  </script>

</body>
</html>
